# Composite action orchestrating publish -> sign/verify -> optional Quay promotion.
name: Publish Gemara OCI bundle
description: Publish, sign, verify, and optionally promote Gemara OCI artifacts

branding:
  icon: package
  color: blue

inputs:
  publish_mode:
    description: layout-copy copies an OCI layout; sdk runs gemara_binary; gemara-file delegates file-based pack/push
    required: false
    default: layout-copy
  registry:
    description: Registry host (e.g. ghcr.io)
    required: false
    default: ghcr.io
  repository:
    description: Repository path without registry (e.g. org/gemara/my-bundle)
    required: true
  tag:
    description: Tag to push
    required: true
  oci_layout_path:
    description: OCI image layout directory (layout-copy)
    required: false
    default: ""
  pack_path:
    description: Fallback path if oci_layout_path is empty
    required: false
    default: "."
  layout_ref:
    description: oras cp PATH:REF (layout-copy only)
    required: false
    default: ""
  gemara_binary:
    description: gemara CLI path or name (sdk only)
    required: false
    default: ""
  sdk_args:
    description: Arguments for gemara_binary (sdk only)
    required: false
    default: ""
  username:
    description: Registry user
    required: false
    default: ""
  password:
    description: Registry token (omit with plain_http for HTTP registries only)
    required: false
    default: ""
  oras_version:
    description: ORAS CLI version (no v prefix)
    required: false
    default: "1.2.0"
  plain_http:
    description: Use HTTP to registry (e.g. localhost CI)
    required: false
    default: "false"
  file:
    description: Root Gemara bundle YAML (gemara-file mode)
    required: false
    default: ""
  validate:
    description: Validate bundle before packing (gemara-file mode)
    required: false
    default: "true"
  bundle_version:
    description: Bundle format version (gemara-file mode)
    required: false
    default: "1"
  working_directory:
    description: Working directory for gemara-file mode
    required: false
    default: "."
  sign_source:
    description: Keyless-sign source digest after publish
    required: false
    default: "true"
  verify_source:
    description: Verify source digest signature after sign/publish
    required: false
    default: "true"
  promote_to_quay:
    description: Copy artifact from source registry to Quay
    required: false
    default: "false"
  quay_registry:
    description: Destination registry for promotion
    required: false
    default: quay.io
  quay_image:
    description: Destination image path without registry (required when promote_to_quay=true)
    required: false
    default: ""
  quay_tag:
    description: Destination tag (defaults to tag input)
    required: false
    default: ""
  quay_username:
    description: Quay robot or service user
    required: false
    default: ""
  quay_password:
    description: Quay token/password
    required: false
    default: ""
  trust_mode:
    description: copy-only, copy-referrers, or resign destination
    required: false
    default: resign
  sign_destination:
    description: Keyless-sign destination digest (usually true for trust_mode=resign)
    required: false
    default: "true"
  verify_destination:
    description: Verify destination digest signature
    required: false
    default: "true"
  allowed_identity_regex:
    description: Optional regex for certificate identity in cosign verify
    required: false
    default: ""
  cosign_version:
    description: Cosign release version
    required: false
    default: v2.4.0

outputs:
  digest:
    description: Source manifest digest (sha256:...)
    value: ${{ steps.finalize.outputs.source_digest }}
  source_ref:
    description: Published source reference with digest
    value: ${{ steps.finalize.outputs.source_ref }}
  source_digest:
    description: Published source digest
    value: ${{ steps.finalize.outputs.source_digest }}
  destination_ref:
    description: Destination reference with digest after promotion
    value: ${{ steps.finalize.outputs.destination_ref }}
  destination_digest:
    description: Destination digest after promotion
    value: ${{ steps.finalize.outputs.destination_digest }}
  trust_mode:
    description: Effective trust mode used for destination handling
    value: ${{ steps.finalize.outputs.trust_mode }}
  verified_source:
    description: true when source verification step passed
    value: ${{ steps.finalize.outputs.verified_source }}
  verified_destination:
    description: true when destination verification step passed
    value: ${{ steps.finalize.outputs.verified_destination }}

runs:
  using: composite
  steps:
    - name: Install ORAS CLI
      uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1
      with:
        version: ${{ inputs.oras_version }}

    - name: Install cosign
      if: >-
        inputs.sign_source == 'true' || inputs.verify_source == 'true' || inputs.promote_to_quay == 'true'
      uses: sigstore/cosign-installer@4959ce089c160fddf62f7b42464195ba1a56d382 # v3.6.0
      with:
        cosign-release: ${{ inputs.cosign_version }}

    - name: Publish (layout-copy or sdk)
      id: publish
      if: ${{ inputs.publish_mode != 'gemara-file' }}
      shell: bash
      env:
        PUBLISH_MODE: ${{ inputs.publish_mode }}
        REGISTRY: ${{ inputs.registry }}
        REPOSITORY: ${{ inputs.repository }}
        TAG: ${{ inputs.tag }}
        OCI_LAYOUT_PATH: ${{ inputs.oci_layout_path != '' && inputs.oci_layout_path || inputs.pack_path }}
        LAYOUT_REF: ${{ inputs.layout_ref }}
        GEMARA_BINARY: ${{ inputs.gemara_binary }}
        SDK_ARGS: ${{ inputs.sdk_args }}
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
        PLAIN_HTTP: ${{ inputs.plain_http }}
      run: |
        set -euo pipefail
        : "${GITHUB_OUTPUT:?}"

        REGISTRY="${REGISTRY:?}"
        REPOSITORY="${REPOSITORY:?}"
        TAG="${TAG:?}"
        DEST="${REGISTRY}/${REPOSITORY}:${TAG}"

        PLAIN="${PLAIN_HTTP:-false}"
        TO_FLAGS=()
        RESOLVE_FLAGS=()
        if [[ "$PLAIN" == "true" ]]; then
          TO_FLAGS=(--to-plain-http)
          RESOLVE_FLAGS=(--plain-http)
        fi

        registry_login() {
          if [[ "$PLAIN" == "true" ]]; then return 0; fi
          if [[ -n "${PASSWORD:-}" ]]; then
            USER_L="${USERNAME:-}"
            [[ -n "$USER_L" ]] || USER_L="${GITHUB_ACTOR:-oauth2}"
            echo "$PASSWORD" | oras login "$REGISTRY" -u "$USER_L" --password-stdin
          else
            echo "::error::password required for HTTPS (or plain_http: true)"
            exit 1
          fi
        }

        write_digest() {
          local CP_OUT="$1"
          local DIGEST
          DIGEST=$(oras resolve "$DEST" "${RESOLVE_FLAGS[@]}" 2>/dev/null | tr -d '\r\n' || true)
          [[ -n "$DIGEST" ]] || DIGEST=$(printf '%s\n' "$CP_OUT" | sed -n 's/^[[:space:]]*Digest:[[:space:]]*//p' | tail -1 | tr -d '\r\n')
          if [[ -z "$DIGEST" ]]; then
            echo "::error::Could not resolve digest"
            exit 1
          fi
          echo "digest=$DIGEST" >>"$GITHUB_OUTPUT"
          echo "Published ${DEST} (${DIGEST})"
        }

        case "${PUBLISH_MODE:-layout-copy}" in
        layout-copy)
          OCI_LAYOUT_PATH="${OCI_LAYOUT_PATH:-.}"
          if [[ ! -f "${OCI_LAYOUT_PATH}/index.json" ]]; then
            echo "::error::No OCI layout at ${OCI_LAYOUT_PATH} (need index.json)"
            exit 1
          fi
          LAYOUT_REF="${LAYOUT_REF:?layout_ref required for layout-copy}"
          SRC="${OCI_LAYOUT_PATH}:${LAYOUT_REF}"
          registry_login
          set +e
          CP_OUT=$(oras cp --from-oci-layout "$SRC" "$DEST" "${TO_FLAGS[@]}" 2>&1)
          CP_RC=$?
          set -e
          printf '%s\n' "$CP_OUT"
          [[ "$CP_RC" -eq 0 ]] || { echo "::error::oras cp failed ($CP_RC)"; exit "$CP_RC"; }
          write_digest "$CP_OUT"
          ;;
        sdk)
          [[ -n "${GEMARA_BINARY:-}" ]] || { echo "::error::gemara_binary required for sdk mode"; exit 1; }
          GB="$GEMARA_BINARY"
          [[ -x "$GB" ]] || command -v "$GB" &>/dev/null || { echo "::error::gemara_binary not found: $GB"; exit 1; }
          [[ -x "$GB" ]] || GB=$(command -v "$GB")
          export GEMARA_REGISTRY="$REGISTRY" GEMARA_REPOSITORY="$REPOSITORY" GEMARA_TAG="$TAG"
          registry_login
          set +e
          CP_OUT=$("$GB" ${SDK_ARGS:-} 2>&1)
          CP_RC=$?
          set -e
          printf '%s\n' "$CP_OUT"
          [[ "$CP_RC" -eq 0 ]] || { echo "::error::gemara failed ($CP_RC)"; exit "$CP_RC"; }
          write_digest "$CP_OUT"
          ;;
        *)
          echo "::error::Unknown publish_mode: ${PUBLISH_MODE} (supported: layout-copy, sdk, gemara-file)"
          exit 1
          ;;
        esac

    - name: Publish (gemara-file)
      id: publish_gemara
      if: ${{ inputs.publish_mode == 'gemara-file' }}
      uses: sonupreetam/gemara-publish-oci@1aa636e537ff890abbfc48c203f8579f3d1111a1
      with:
        registry: ${{ inputs.registry }}
        repository: ${{ inputs.repository }}
        tag: ${{ inputs.tag }}
        file: ${{ inputs.file }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
        validate: ${{ inputs.validate }}
        bundle_version: ${{ inputs.bundle_version }}
        working_directory: ${{ inputs.working_directory }}

    - name: Sign, verify, and optionally promote to Quay
      id: finalize
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REPOSITORY: ${{ inputs.repository }}
        TAG: ${{ inputs.tag }}
        PASSWORD: ${{ inputs.password }}
        USERNAME: ${{ inputs.username }}
        PUBLISH_DIGEST: ${{ steps.publish.outputs.digest }}
        PUBLISH_GEMARA_DIGEST: ${{ steps.publish_gemara.outputs.digest }}
        SIGN_SOURCE: ${{ inputs.sign_source }}
        VERIFY_SOURCE: ${{ inputs.verify_source }}
        PROMOTE_TO_QUAY: ${{ inputs.promote_to_quay }}
        QUAY_REGISTRY: ${{ inputs.quay_registry }}
        QUAY_IMAGE: ${{ inputs.quay_image }}
        QUAY_TAG: ${{ inputs.quay_tag }}
        QUAY_USERNAME: ${{ inputs.quay_username }}
        QUAY_PASSWORD: ${{ inputs.quay_password }}
        TRUST_MODE: ${{ inputs.trust_mode }}
        SIGN_DESTINATION: ${{ inputs.sign_destination }}
        VERIFY_DESTINATION: ${{ inputs.verify_destination }}
        ALLOWED_IDENTITY_REGEX: ${{ inputs.allowed_identity_regex }}
        DEFAULT_ALLOWED_IDENTITY_REGEX: ${{ format('^https://github.com/{0}/.github/workflows/', github.repository) }}
      run: |
        set -euo pipefail
        : "${GITHUB_OUTPUT:?}"

        SOURCE_DIGEST="${PUBLISH_DIGEST:-}"
        if [[ -z "${SOURCE_DIGEST}" ]]; then
          SOURCE_DIGEST="${PUBLISH_GEMARA_DIGEST:-}"
        fi
        if [[ -z "${SOURCE_DIGEST:-}" ]]; then
          echo "::error::No digest produced by publish step."
          exit 1
        fi

        if [[ -z "${ALLOWED_IDENTITY_REGEX:-}" ]]; then
          ALLOWED_IDENTITY_REGEX="${DEFAULT_ALLOWED_IDENTITY_REGEX}"
        fi

        SOURCE_REF_TAGGED="${REGISTRY}/${REPOSITORY}:${TAG}"
        SOURCE_REF="${REGISTRY}/${REPOSITORY}@${SOURCE_DIGEST}"
        echo "source_ref=${SOURCE_REF}" >> "${GITHUB_OUTPUT}"
        echo "source_digest=${SOURCE_DIGEST}" >> "${GITHUB_OUTPUT}"
        echo "destination_ref=" >> "${GITHUB_OUTPUT}"
        echo "destination_digest=" >> "${GITHUB_OUTPUT}"
        echo "trust_mode=${TRUST_MODE}" >> "${GITHUB_OUTPUT}"
        echo "verified_source=false" >> "${GITHUB_OUTPUT}"
        echo "verified_destination=false" >> "${GITHUB_OUTPUT}"

        verify_ref() {
          local ref="$1"
          cosign verify "$ref" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            --certificate-identity-regexp "${ALLOWED_IDENTITY_REGEX}" >/dev/null
        }

        source_user="${USERNAME:-${GITHUB_ACTOR:-oauth2}}"
        if [[ "${SIGN_SOURCE}" == "true" || "${VERIFY_SOURCE}" == "true" ]]; then
          if [[ -n "${PASSWORD:-}" ]]; then
            echo "${PASSWORD}" | docker login "${REGISTRY}" -u "${source_user}" --password-stdin
          fi
        fi

        if [[ "${SIGN_SOURCE}" == "true" ]]; then
          echo "Signing source digest: ${SOURCE_REF}"
          cosign sign -y "${SOURCE_REF}"
        fi

        if [[ "${VERIFY_SOURCE}" == "true" ]]; then
          echo "Verifying source digest: ${SOURCE_REF}"
          verify_ref "${SOURCE_REF}"
          echo "verified_source=true" >> "${GITHUB_OUTPUT}"
        fi

        if [[ "${PROMOTE_TO_QUAY}" != "true" ]]; then
          exit 0
        fi

        if [[ -z "${QUAY_IMAGE}" || -z "${QUAY_USERNAME}" || -z "${QUAY_PASSWORD}" ]]; then
          echo "::error::quay_image, quay_username, and quay_password are required when promote_to_quay=true."
          exit 1
        fi
        if [[ -z "${PASSWORD}" ]]; then
          echo "::error::password is required to pull source image from registry during promotion."
          exit 1
        fi

        DEST_TAG="${QUAY_TAG:-${TAG}}"
        DEST_REF_TAGGED="${QUAY_REGISTRY}/${QUAY_IMAGE}:${DEST_TAG}"

        src_user="${source_user}"
        echo "${PASSWORD}" | oras login "${REGISTRY}" -u "${src_user}" --password-stdin
        echo "${QUAY_PASSWORD}" | oras login "${QUAY_REGISTRY}" -u "${QUAY_USERNAME}" --password-stdin
        if [[ "${TRUST_MODE}" == "resign" || "${SIGN_DESTINATION}" == "true" || "${VERIFY_DESTINATION}" == "true" ]]; then
          echo "${QUAY_PASSWORD}" | docker login "${QUAY_REGISTRY}" -u "${QUAY_USERNAME}" --password-stdin
        fi

        case "${TRUST_MODE}" in
          copy-only)
            oras copy "${SOURCE_REF_TAGGED}" "${DEST_REF_TAGGED}"
            ;;
          copy-referrers)
            oras copy --recursive "${SOURCE_REF_TAGGED}" "${DEST_REF_TAGGED}"
            ;;
          resign)
            oras copy "${SOURCE_REF_TAGGED}" "${DEST_REF_TAGGED}"
            ;;
          *)
            echo "::error::Unsupported trust_mode: ${TRUST_MODE} (copy-only, copy-referrers, resign)"
            exit 1
            ;;
        esac

        DEST_DIGEST="$(oras resolve "${DEST_REF_TAGGED}" | tr -d '\r\n')"
        if [[ -z "${DEST_DIGEST}" ]]; then
          echo "::error::Failed to resolve destination digest for ${DEST_REF_TAGGED}"
          exit 1
        fi
        DEST_REF="${QUAY_REGISTRY}/${QUAY_IMAGE}@${DEST_DIGEST}"

        if [[ "${TRUST_MODE}" == "resign" || "${SIGN_DESTINATION}" == "true" ]]; then
          echo "Signing destination digest: ${DEST_REF}"
          cosign sign -y "${DEST_REF}"
        fi

        if [[ "${VERIFY_DESTINATION}" == "true" ]]; then
          echo "Verifying destination digest: ${DEST_REF}"
          verify_ref "${DEST_REF}"
          echo "verified_destination=true" >> "${GITHUB_OUTPUT}"
        fi

        echo "destination_ref=${DEST_REF}" >> "${GITHUB_OUTPUT}"
        echo "destination_digest=${DEST_DIGEST}" >> "${GITHUB_OUTPUT}"
