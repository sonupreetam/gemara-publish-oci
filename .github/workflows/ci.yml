name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: YAML syntax (action.yml)
        run: ruby -ryaml -e "YAML.load_file('action.yml'); puts 'action.yml OK'"

      - name: Go (tools/publish)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/publish/go.mod
          cache-dependency-path: tools/publish/go.sum

      - name: Build gemara-file publisher
        run: go build -C tools/publish -o "${RUNNER_TEMP}/gemara-publish" .

      - name: Validate + assemble + pack (dry run)
        run: |
          set -euo pipefail
          cd testdata
          GEMARA_REGISTRY_PASSWORD=ci-dummy "${RUNNER_TEMP}/gemara-publish" \
            -registry=localhost:5000 \
            -repository=ci/test \
            -tag=ci \
            -file=minimal-catalog.yaml \
            -username=ci \
            -validate=true 2>&1 | tee /tmp/publish-out.txt || true
          if grep -q "^assemble:" /tmp/publish-out.txt; then
            echo "::error::Assemble failed"
            exit 1
          fi
          if grep -q "^validate:" /tmp/publish-out.txt; then
            echo "::error::Validation failed"
            exit 1
          fi
          if grep -q "^pack:" /tmp/publish-out.txt; then
            echo "::error::Pack failed"
            exit 1
          fi
          echo "Assemble + pack succeeded (push expected to fail — no registry)"
