name: CI

on:
  workflow_dispatch:
    inputs:
      run_quay_spike:
        description: Run GHCR -> Quay trust-mode spike jobs
        required: false
        type: boolean
        default: false
      quay_dest_image:
        description: Quay namespace/repository without registry
        required: false
        type: string
        default: test_complytime/complytime-policies
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: YAML syntax (action.yml)
        run: ruby -ryaml -e "YAML.load_file('action.yml'); puts 'action.yml OK'"

  integration:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start local registry
        run: |
          docker run -d -p 5000:5000 --name ci-registry registry:2
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5000/v2/ >/dev/null 2>&1; then
              echo "registry ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::registry did not become ready"
          exit 1

      - name: Publish test fixture via action
        id: publish
        uses: ./
        with:
          publish_mode: layout-copy
          registry: localhost:5000
          repository: test/gemara
          tag: ci-${{ github.run_id }}
          oci_layout_path: testdata/minimal-layout
          layout_ref: v1
          plain_http: true

      # sdk mode is not exercised here: a smoke test needs a real push to DEST so
      # digest resolution succeeds; sdk_args is word-split in action.yml, so a
      # bash -c one-liner is fragile. See specs/001-gemara-publish-oci-action/plan.md.

      - name: Verify digest output
        run: |
          test -n "${{ steps.publish.outputs.digest }}"
          echo "digest=${{ steps.publish.outputs.digest }}"
          echo "${{ steps.publish.outputs.digest }}" | grep -qE '^sha256:[a-f0-9]{64}$'

  e2e-policy-oci-ghcr-sign-verify:
    name: E2E policy OCI (GHCR) via composite sign+verify
    needs: validate
    runs-on: ubuntu-latest
    if: >
      !(
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository
      )
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Registry path (GHCR is lowercase)
        id: reg
        run: |
          echo "repository_lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Publish policy OCI bundle to GHCR
        id: policy
        uses: ./
        with:
          publish_mode: layout-copy
          registry: ghcr.io
          repository: ${{ steps.reg.outputs.repository_lc }}
          tag: policy-ci-${{ github.run_id }}-${{ github.run_attempt }}
          oci_layout_path: testdata/minimal-layout
          layout_ref: v1
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          sign_source: "true"
          verify_source: "true"
          promote_to_quay: "false"

      - name: Verify composite outputs
        run: |
          test -n "${{ steps.policy.outputs.source_ref }}"
          test -n "${{ steps.policy.outputs.source_digest }}"
          test "${{ steps.policy.outputs.verified_source }}" = "true"
          echo "source_ref=${{ steps.policy.outputs.source_ref }}"
          echo "source_digest=${{ steps.policy.outputs.source_digest }}"

  e2e-ghcr-quay-trust-spike:
    name: GHCR -> Quay trust-mode spike
    needs: validate
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      && inputs.run_quay_spike
      && !(
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository
      )
    strategy:
      fail-fast: false
      matrix:
        trust_mode: [copy-referrers, resign]
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Registry path (GHCR is lowercase)
        id: reg
        run: |
          echo "repository_lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Run trust mode
        id: trust
        env:
          QUAY_USER: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_TOKEN: ${{ secrets.QUAY_ROBOT_TOKEN }}
        run: |
          if [ -z "${QUAY_USER}" ] || [ -z "${QUAY_TOKEN}" ]; then
            echo "::error::QUAY_ROBOT_USERNAME and QUAY_ROBOT_TOKEN are required for spike runs."
            exit 1
          fi

      - name: Publish + promote + verify
        id: publish
        uses: ./
        with:
          publish_mode: layout-copy
          registry: ghcr.io
          repository: ${{ steps.reg.outputs.repository_lc }}
          tag: spike-${{ matrix.trust_mode }}-${{ github.run_id }}-${{ github.run_attempt }}
          oci_layout_path: testdata/minimal-layout
          layout_ref: v1
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          sign_source: "true"
          verify_source: "true"
          promote_to_quay: "true"
          quay_registry: quay.io
          quay_image: ${{ inputs.quay_dest_image }}
          quay_username: ${{ secrets.QUAY_ROBOT_USERNAME }}
          quay_password: ${{ secrets.QUAY_ROBOT_TOKEN }}
          trust_mode: ${{ matrix.trust_mode }}
          sign_destination: ${{ matrix.trust_mode == 'resign' && 'true' || 'false' }}
          verify_destination: "true"

      - name: Print spike result
        run: |
          echo "trust_mode=${{ matrix.trust_mode }}"
          echo "source_ref=${{ steps.publish.outputs.source_ref }}"
          echo "destination_ref=${{ steps.publish.outputs.destination_ref }}"
          echo "verified_source=${{ steps.publish.outputs.verified_source }}"
          echo "verified_destination=${{ steps.publish.outputs.verified_destination }}"
