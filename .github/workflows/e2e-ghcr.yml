# Manual end-to-end publish to GHCR. Run from Actions tab.
name: E2E publish to GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Publish minimal bundle
        id: publish
        uses: ./
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}
          tag: bundle-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          file: tools/publish/testdata/minimal-catalog.yaml
          bundle_version: "1"
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify digest output
        run: |
          d="${{ steps.publish.outputs.digest }}"
          [[ -n "$d" ]] || { echo "::error::empty digest"; exit 1; }
          [[ "$d" == sha256:* ]] || { echo "::error::digest not sha256 form: $d"; exit 1; }
          echo "digest=$d"
